name: 🚀 Deploy Laravel to Production

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, ctype, json, bcmath, pdo, mysql, zip

      - name: 📦 Install Composer Dependencies
        run: composer install --optimize-autoloader --no-dev --no-progress --no-interaction --prefer-dist

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"

      - name: Install NPM Dependencies
        run: npm install

      - name: Build NPM Assets
        run:
          npm run build

            - name: 📂 Deploy App Files (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ecommerce_files/
          exclude: |
            **/.git*
            **/node_modules/**
            **/public/**
            **/.env*

      - name: 🌐 Deploy Public to Root (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: demo.ecommerce.sheffieldafrica.com/
          local-dir: ./public/

      # Post-deploy: cleanup + optimize only
      - name: ⚙️ Post-Deployment Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd ${{ secrets.APP_ROOT_DIR }}

            # Cleanup: Empty public/* but keep public/build folder structure
            rm -rf public/*

            # Final optimize (matches your manual process exactly)
            php artisan optimize:clear
            php artisan optimize

            echo "✅ Deployment completed! public/ now contains only build/"
