name: 🚀 Deploy Laravel to Production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Manual trigger

jobs:
  deploy:
    name: Deploy to demo.ecommerce.sheffieldafrica.com
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, ctype, json, bcmath, pdo, mysql, zip

      - name: 📦 Install Composer Dependencies
        run: composer install --optimize-autoloader --no-dev --no-progress --no-interaction --prefer-dist

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"

      - name: Install NPM Dependencies
        run: npm ci --quiet

      - name: Build NPM Assets
        run: npm run build

      - name: 💾 Cache Laravel Configuration
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      # Deploy ENTIRE Laravel project to /home/yourusername/demo-ecommerce/
      - name: 📂 Deploy Laravel App Files
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avzr --delete --exclude='.git*' --exclude='.github' --exclude='node_modules' --exclude='.env*' --exclude='public/hot' --exclude='public/storage' --exclude='storage/logs/*' --exclude='storage/framework/cache/data/*' --exclude='storage/framework/sessions/*' --exclude='storage/framework/views/*' --exclude='tests' --exclude='phpunit.xml'
          path: ./
          remote_path: /home/yourusername/demo-ecommerce/ # FULL Laravel project path
          remote_host: ${{ secrets.FTP_SERVER }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.FTP_USERNAME }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          remote_key_pass: ${{ secrets.SSH_PASSPHRASE }}

      # Run post-deployment commands in the Laravel root
      - name: ⚙️ Post-Deployment Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd /home/yourusername/demo-ecommerce

            # Generate app key if missing
            php artisan key:generate --no-interaction --force || true

            # Clear all caches
            php artisan optimize:clear

            # Rebuild production caches
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Run migrations safely
            php artisan migrate --force || echo "Migrations skipped"

            # Storage link
            php artisan storage:link --force || true

            # Set correct permissions
            chmod -R 755 storage bootstrap/cache

            echo "✅ Deployment to demo.ecommerce.sheffieldafrica.com completed!"
