name: 🚀 Deploy Laravel to Production

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, ctype, json, bcmath, pdo, mysql, zip

      - name: 📦 Install Composer Dependencies
        run: composer install --optimize-autoloader --no-dev --no-progress --no-interaction --prefer-dist

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"

      - name: Install NPM Dependencies
        run: npm install

      - name: Build NPM Assets
        run: npm run build

      - name: 💾 Pre-optimize Laravel
        run: |
          php artisan optimize:clear
          php artisan optimize  # Builds config/route caches

            # Deploy app to ecommerce_files (exclude public entirely)
      - name: 📂 Deploy Laravel Files to App Dir
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avzr --delete --exclude='.git*' --exclude='.github' --exclude='node_modules' --exclude='.env*' --exclude='public/**' --exclude='storage/logs/*'
          path: ./
          remote_path: ${{ secrets.APP_ROOT_DIR }}
          remote_host: ${{ secrets.FTP_SERVER }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.FTP_USERNAME }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          remote_key_pass: ${{ secrets.SSH_PASSPHRASE }}

      # Deploy public contents to web root (everything gets copied)
      - name: 🌐 Deploy Public to Web Root
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avzr --delete # Copies index.php, .htaccess, js/css, etc.
          path: ./public/
          remote_path: ${{ secrets.WEB_ROOT_DIR }}

      # Post-deploy: cleanup + optimize only
      - name: ⚙️ Post-Deployment Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd ${{ secrets.APP_ROOT_DIR }}

            # Cleanup: Empty public/* but keep public/build folder structure
            rm -rf public/*

            # Final optimize (matches your manual process exactly)
            php artisan optimize:clear
            php artisan optimize

            echo "✅ Deployment completed! public/ now contains only build/"
