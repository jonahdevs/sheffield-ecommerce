<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>All Categories — Sheffield</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="storefront.css"/>
<script>
  tailwind.config = { theme: { extend: {
    fontFamily: { sans:['"Public Sans"','system-ui','sans-serif'], serif:['"Newsreader"','Georgia','serif'], mono:['"JetBrains Mono"','monospace'] },
    colors: {
      brand:{500:'hsl(354,68%,45%)',600:'hsl(354,68%,40%)',700:'hsl(354,68%,35%)'},
      'brand-blue':{500:'hsl(229,52%,39%)',600:'hsl(229,52%,34%)',700:'hsl(229,52%,29%)'},
      ink:'#0c1421','ink-2':'#2b3344','ink-3':'#5d6577','ink-4':'#8c93a3',
      surface:'#ffffff','surface-sunken':'#f4f6fb',line:'#dde2eb','line-strong':'#b9c0cf',
    }, borderRadius:{DEFAULT:'0.25rem'},
  }}};
</script>
</head>
<body class="min-h-screen bg-white text-ink antialiased">

<div id="sf-header"></div>

<main>
<div class="page-fade">
  <div class="shell pt-4 pb-20">
    <nav class="mb-4 flex items-center gap-2 text-[13px] text-ink-3">
      <a href="Home.html" class="hover:text-ink">Home</a><span class="text-ink-4">/</span><span class="text-ink-2">Categories</span>
    </nav>
    <div class="mb-8">
      <h1 class="text-3xl font-semibold tracking-tight">All Categories</h1>
      <p class="mt-1 text-[14px] text-ink-3">Browse our full range of commercial equipment.</p>
    </div>
    <div id="catTiles" class="grid grid-cols-2 gap-x-5 gap-y-7 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 2xl:grid-cols-7"></div>
  </div>
</div>
</main>

<div id="sf-footer"></div>

<script src="storefront-data.js"></script>
<script src="storefront-chrome.js"></script>
<script>
  SFChrome.mount('shop');
  document.getElementById('catTiles').innerHTML = SF.categories.map(c => SFChrome.categoryTile(c)).join('');
</script>
</body>
</html>
