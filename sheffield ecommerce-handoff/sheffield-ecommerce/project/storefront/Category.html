<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Category — Sheffield</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="storefront.css"/>
<script>
  tailwind.config = { theme: { extend: {
    fontFamily: { sans:['"Public Sans"','system-ui','sans-serif'], serif:['"Newsreader"','Georgia','serif'], mono:['"JetBrains Mono"','monospace'] },
    colors: {
      brand:{500:'hsl(354,68%,45%)',600:'hsl(354,68%,40%)',700:'hsl(354,68%,35%)'},
      'brand-blue':{500:'hsl(229,52%,39%)',600:'hsl(229,52%,34%)',700:'hsl(229,52%,29%)'},
      ink:'#0c1421','ink-2':'#2b3344','ink-3':'#5d6577','ink-4':'#8c93a3',
      surface:'#ffffff','surface-sunken':'#f4f6fb',line:'#dde2eb','line-strong':'#b9c0cf',
    }, borderRadius:{DEFAULT:'0.25rem'},
  }}};
</script>
</head>
<body class="min-h-screen bg-white text-ink antialiased">

<div id="sf-header"></div>

<main>
<div class="page-fade">
  <!-- Breadcrumb -->
  <div class="shell py-3">
    <nav class="flex items-center gap-2 text-[13px] text-ink-3">
      <a href="Home.html" class="hover:text-ink">Home</a><span class="text-ink-4">/</span>
      <a href="Categories.html" class="hover:text-ink">Categories</a><span class="text-ink-4">/</span>
      <span id="bcName" class="text-ink-2">Category</span>
    </nav>
  </div>

  <!-- Category hero (no banner → surface-sunken) -->
  <div class="relative overflow-hidden border-b border-zinc-200 bg-surface-sunken py-6 sm:py-10">
    <div class="shell relative z-10">
      <h1 id="catTitle" class="text-xl font-semibold tracking-tight text-ink sm:text-2xl">Category</h1>
      <p id="catDesc" class="mt-2 max-w-xl text-[14px] text-ink-3"></p>
    </div>
  </div>

  <div class="shell pt-4 pb-20">
    <div class="mt-4 grid grid-cols-1 gap-8 lg:grid-cols-[260px_1fr]">
      <!-- Scoped filters (no category section) -->
      <aside id="filters" class="hidden lg:block lg:sticky lg:top-32 lg:max-h-[calc(100vh-9rem)] lg:self-start lg:overflow-y-auto scrollbar-hover"></aside>

      <div class="min-w-0">
        <div class="mb-5 flex flex-col gap-3 py-2.5 sm:flex-row sm:items-center sm:justify-between">
          <div class="flex items-center gap-3">
            <button id="mobileFilterBtn" class="inline-flex h-9 items-center gap-1.5 rounded border border-zinc-200 bg-white px-3 text-[13px] font-medium lg:hidden">Filters <span id="mfDot" class="hidden size-2 rounded-full bg-brand-500"></span></button>
            <div class="text-[13.5px] text-ink-3">Showing <span id="resultCount" class="font-semibold text-ink">0</span> <span id="resultNoun">products</span>
              <button id="clearInline" class="ml-2.5 hidden cursor-pointer text-[13px] text-brand-500 underline-offset-2 hover:underline">Clear filters</button>
            </div>
          </div>
          <select id="sortSel" class="h-9 rounded border border-zinc-200 bg-white px-2.5 text-[13px] focus:border-brand-500 focus:outline-none">
            <option value="popularity">Most popular</option>
            <option value="newest">Newest</option>
            <option value="name-asc">Name (A–Z)</option>
            <option value="price-asc">Price — low to high</option>
            <option value="price-desc">Price — high to low</option>
          </select>
        </div>

        <div id="chips" class="mb-5 flex flex-wrap gap-2"></div>
        <div id="grid" class="grid grid-cols-1 gap-3.5 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4"></div>
        <div id="empty" class="hidden rounded-md bg-surface-sunken p-16 text-center">
          <div class="font-serif text-2xl text-ink">No products in this category yet</div>
          <p class="mt-2 text-ink-3">Try removing filters, or browse the full catalog.</p>
          <div class="mt-5 flex justify-center gap-2">
            <button id="emptyClear" class="rounded-md border border-zinc-300 px-5 py-2.5 text-sm font-semibold text-ink transition hover:bg-surface-sunken">Clear filters</button>
            <a href="Shop.html" class="rounded-md bg-brand-500 px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-brand-600">Browse all products</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</main>

<!-- Mobile filter drawer -->
<div id="mobileDrawer" class="fixed inset-0 z-50 hidden lg:hidden">
  <div id="drawerBackdrop" class="absolute inset-0 bg-black/40"></div>
  <div class="relative flex h-full w-72 max-w-[85vw] flex-col overflow-y-auto bg-white shadow-xl">
    <div class="sticky top-0 z-10 flex items-center justify-between border-b border-zinc-200 bg-white px-5 py-3.5">
      <span class="text-[13px] font-bold uppercase tracking-[0.08em] text-ink">Filters</span>
      <button id="drawerClose" class="cursor-pointer text-ink-3 hover:text-ink">✕</button>
    </div>
    <div id="filtersMobile" class="flex-1"></div>
    <div class="sticky bottom-0 border-t border-zinc-200 bg-white px-5 py-3.5">
      <button id="drawerApply" class="w-full rounded-md bg-brand-500 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-brand-600">View results</button>
    </div>
  </div>
</div>

<div id="sf-footer"></div>

<script src="storefront-data.js"></script>
<script src="storefront-chrome.js"></script>
<script src="storefront-category.js"></script>
</body>
</html>
